<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#fbfbf7"/>
  <style>
    text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#172033}
    .box{fill:#fff;stroke:#0f766e;stroke-width:2;rx:8}
    .core{fill:#ecfeff;stroke:#0f766e;stroke-width:3;rx:12}
    .line{stroke:#64748b;stroke-width:2}
    .title{font-size:20px;font-weight:700}.body{font-size:16px}.small{font-size:14px}
  </style>
  <text class="title" x="30" y="36">NPU 学习要反复追问的四件事</text>
  <rect class="core" x="355" y="115" width="190" height="76"/>
  <text class="body" x="385" y="147">一次输出值</text>
  <text class="small" x="391" y="172">输入 × 权重 + 累加</text>
  <rect class="box" x="55" y="75" width="210" height="58"/>
  <text class="body" x="87" y="110">算什么？算子与形状</text>
  <rect class="box" x="55" y="190" width="210" height="58"/>
  <text class="body" x="83" y="225">怎么算？循环与依赖</text>
  <rect class="box" x="635" y="75" width="210" height="58"/>
  <text class="body" x="665" y="110">放哪里？buffer/SRAM</text>
  <rect class="box" x="635" y="190" width="210" height="58"/>
  <text class="body" x="666" y="225">怎么搬？DMA/dataflow</text>
  <line class="line" x1="265" y1="105" x2="355" y2="140"/>
  <line class="line" x1="265" y1="220" x2="355" y2="168"/>
  <line class="line" x1="545" y1="140" x2="635" y2="105"/>
  <line class="line" x1="545" y1="168" x2="635" y2="220"/>
</svg>

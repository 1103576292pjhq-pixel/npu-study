<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280">
  <rect width="760" height="280" fill="#ffffff"/>
  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <text x="45" y="35">shape=[2,3,4]：2 张表，每张 3 行 4 列</text>
    <rect x="90" y="75" width="190" height="120" fill="#eef2ff" stroke="#4f46e5"/>
    <line x1="90" y1="115" x2="280" y2="115" stroke="#4f46e5"/><line x1="90" y1="155" x2="280" y2="155" stroke="#4f46e5"/>
    <line x1="137" y1="75" x2="137" y2="195" stroke="#4f46e5"/><line x1="184" y1="75" x2="184" y2="195" stroke="#4f46e5"/><line x1="231" y1="75" x2="231" y2="195" stroke="#4f46e5"/>
    <rect x="150" y="45" width="190" height="120" fill="#fef3c7" stroke="#d97706" opacity="0.85"/>
    <line x1="150" y1="85" x2="340" y2="85" stroke="#d97706"/><line x1="150" y1="125" x2="340" y2="125" stroke="#d97706"/>
    <line x1="197" y1="45" x2="197" y2="165" stroke="#d97706"/><line x1="244" y1="45" x2="244" y2="165" stroke="#d97706"/><line x1="291" y1="45" x2="291" y2="165" stroke="#d97706"/>
    <text x="395" y="80">轴 0：选第几张表，长度 2</text>
    <text x="395" y="120">轴 1：选第几行，长度 3</text>
    <text x="395" y="160">轴 2：选第几列，长度 4</text>
    <text x="90" y="235">元素总数 = 2*3*4 = 24</text>
  </g>
</svg>

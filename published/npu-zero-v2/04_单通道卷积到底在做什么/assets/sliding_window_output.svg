<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <rect width="760" height="300" fill="#ffffff"/>
  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <text x="40" y="35">2x2 窗口在 3x3 输入上滑动，生成 2x2 输出</text>
    <rect x="70" y="70" width="180" height="180" fill="#f8fafc" stroke="#64748b"/>
    <g stroke="#64748b">
      <line x1="130" y1="70" x2="130" y2="250"/><line x1="190" y1="70" x2="190" y2="250"/>
      <line x1="70" y1="130" x2="250" y2="130"/><line x1="70" y1="190" x2="250" y2="190"/>
    </g>
    <text x="98" y="105">1</text><text x="158" y="105">0</text><text x="218" y="105">2</text>
    <text x="98" y="165">0</text><text x="158" y="165">1</text><text x="218" y="165">3</text>
    <text x="98" y="225">2</text><text x="158" y="225">1</text><text x="218" y="225">0</text>
    <rect x="70" y="70" width="120" height="120" fill="none" stroke="#2563eb" stroke-width="4"/>
    <rect x="130" y="70" width="120" height="120" fill="none" stroke="#16a34a" stroke-width="4"/>
    <rect x="70" y="130" width="120" height="120" fill="none" stroke="#d97706" stroke-width="4"/>
    <rect x="130" y="130" width="120" height="120" fill="none" stroke="#dc2626" stroke-width="4"/>
    <text x="315" y="160">→</text>
    <rect x="380" y="95" width="140" height="140" fill="#fef2f2" stroke="#dc2626"/>
    <line x1="450" y1="95" x2="450" y2="235" stroke="#dc2626"/><line x1="380" y1="165" x2="520" y2="165" stroke="#dc2626"/>
    <text x="410" y="138">2</text><text x="480" y="138">3</text>
    <text x="410" y="208">1</text><text x="480" y="208">1</text>
    <text x="565" y="160">输出特征图</text>
  </g>
</svg>

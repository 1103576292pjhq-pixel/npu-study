<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280">
  <rect width="760" height="280" fill="#ffffff"/>
  <g font-family="Arial, sans-serif" font-size="18" fill="#111827">
    <text x="40" y="35">矩阵 A 的每一行分别和向量 x 做点积</text>
    <rect x="70" y="70" width="240" height="120" fill="#eef2ff" stroke="#4f46e5"/>
    <line x1="70" y1="130" x2="310" y2="130" stroke="#4f46e5"/>
    <text x="115" y="112">1</text><text x="190" y="112">2</text><text x="265" y="112">3</text>
    <text x="115" y="172">4</text><text x="190" y="172">5</text><text x="265" y="172">6</text>
    <text x="340" y="136">×</text>
    <rect x="380" y="70" width="90" height="120" fill="#ecfdf5" stroke="#059669"/>
    <line x1="380" y1="110" x2="470" y2="110" stroke="#059669"/>
    <line x1="380" y1="150" x2="470" y2="150" stroke="#059669"/>
    <text x="415" y="98">10</text><text x="415" y="138">20</text><text x="415" y="178">30</text>
    <text x="500" y="136">=</text>
    <rect x="545" y="85" width="120" height="90" fill="#fef2f2" stroke="#dc2626"/>
    <text x="585" y="120">140</text>
    <text x="585" y="155">320</text>
    <text x="90" y="230" font-size="16">第一行：1*10 + 2*20 + 3*30 = 140</text>
    <text x="90" y="255" font-size="16">第二行：4*10 + 5*20 + 6*30 = 320</text>
  </g>
</svg>
